# files: 'directory1/directory2'

default_install_hook_types:
    - commit-msg
    - prepare-commit-msg
    - pre-commit
    - pre-merge-commit
    - pre-push
    - pre-rebase
    - post-checkout
    - post-commit
    - post-merge
    - post-rewrite

repos:
    - repo: https://github.com/astral-sh/uv-pre-commit
      rev: 0.9.7
      hooks:
          # Keep uv.lock file up to date
          - id: uv-lock

    - repo: https://github.com/ewjoachim/sync-pre-commit-with-uv
      rev: 1.1.0
      hooks:
          # Synchronizes versions between pre-commit and uv
          - id: sync

    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
          # General
          - id: check-added-large-files
          - id: check-case-conflict
          - id: check-executables-have-shebangs
          - id: check-merge-conflict
          - id: check-symlinks
          - id: check-xml
          - id: check-yaml
          - id: double-quote-string-fixer
          - id: end-of-file-fixer
          - id: fix-byte-order-marker
          - id: mixed-line-ending # Replaces or checks mixed line ending.
          - id:
                trailing-whitespace

                # Json
          - id: check-json
          - id: pretty-format-json # Checks that all your JSON files are pretty.

      # General

    - repo: https://github.com/lycheeverse/lychee.git
      rev: nightly
      hooks:
          - id: lychee
            args: [--cache, --suggest]

    - repo: https://github.com/pre-commit/mirrors-prettier
      rev: v4.0.0-alpha.8
      hooks:
          - id: prettier
            stages: [pre-commit]

      # Git

    - repo: https://github.com/jorisroovers/gitlint
      rev: v0.19.1
      hooks:
          - id: gitlint

    - repo: https://github.com/commitizen-tools/commitizen
      rev: v4.13.9
      hooks:
          - id: commitizen
            stages: [commit-msg]

      # YAML

    - repo: https://github.com/adrienverge/yamllint
      rev: v1.38.0
      hooks:
          - id: yamllint
            args: [-c=.yamllint.yml]

      # SQL

    - repo: https://github.com/sqlfluff/sqlfluff
      rev: 4.1.0
      hooks:
          - id:
                sqlfluff-lint
                # For dbt projects, this installs the dbt "extras".
                # You will need to select the relevant dbt adapter for your dialect
                # (https://docs.getdbt.com/docs/available-adapters):
                # additional_dependencies: ['<dbt-adapter>', 'sqlfluff-templater-dbt']
          - id:
                sqlfluff-fix
                # Arbitrary arguments to show an example
                # args: [--rules, "L003,L014"]
                # additional_dependencies: ['<dbt-adapter>', 'sqlfluff-templater-dbt']

      # Mixed

    - repo: https://github.com/kraymer/cesar
      rev: v1.0.0
      hooks:
          - id: cesar

    - repo: https://github.com/jumanjihouse/pre-commit-hooks
      rev: 3.0.0
      hooks:
          - id: script-must-have-extension
          - id: script-must-not-have-extension

    - repo: https://github.com/scop/pre-commit-shfmt
      rev: v3.13.0-1
      hooks:
          - id: shfmt

    - repo: https://github.com/Lucas-C/pre-commit-hooks
      rev: v1.5.6
      hooks:
          - id: remove-crlf
          - id: remove-tabs
            exclude: .git/COMMIT_EDITMSG

    - repo: https://github.com/sirosen/check-jsonschema
      rev: 0.37.1
      hooks:
          - id: check-github-actions
          - id: check-github-workflows
          - id: check-readthedocs

    - repo: https://github.com/sirwart/ripsecrets
      rev: v0.1.11 # Use latest tag on GitHub
      hooks:
          - id:
                ripsecrets
                # uncomment to check additional patterns
                # args:
                # - --additional-pattern 'mytoken*'
                # - --additional-pattern 'mykey*'

    - repo: https://github.com/rhysd/actionlint
      rev: v1.7.12
      hooks:
          - id: actionlint

    - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
      rev: 3.6.1
      hooks:
          - id: editorconfig-checker

    - repo: https://github.com/MarcoGorelli/cython-lint
      rev: v0.19.0
      hooks:
          - id: cython-lint

    - repo: https://github.com/bridgecrewio/checkov/
      rev: 3.2.513
      hooks:
          - id: checkov
